<style>
:root{
  --ink:#f2efe6;
  --paper:#0e1420;
  --paper-dim:#161d2c;
  --line:#2a3346;
  --gold:#e8a23c;
  --ok:#4fae7a;
  --gray:#7c8499;
  --card:#131a28;

  --c-turkce:#e8a23c;
  --c-matematik:#e0623f;
  --c-tarih:#c98a4b;
  --c-cografya:#4fae7a;
  --c-harita:#3fb6a8;
  --c-felsefe:#9d7fd1;
  --c-din:#d4af5a;
  --c-fizik:#4d8fd6;
  --c-kimya:#4fae7a;
  --c-biyoloji:#d6679a;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family:'Iowan Old Style','Georgia',serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:90px;
  -webkit-font-smoothing:antialiased;
}

.head{
  position:sticky; top:0; z-index:20;
  background:var(--paper);
  border-bottom:2px solid var(--line);
  padding:env(safe-area-inset-top) 20px 0 20px;
}
.head-inner{
  display:flex; align-items:baseline; justify-content:space-between;
  padding:14px 0 12px 0;
}
.brand{
  font-family:'Times New Roman', serif;
  font-weight:700;
  font-size:22px;
  letter-spacing:0.5px;
}
.brand span{color:var(--c-matematik);}
.tarih{
  font-family:-apple-system, sans-serif;
  font-size:12px;
  color:var(--gray);
  text-transform:uppercase;
  letter-spacing:1px;
}

.gunluksayac{
  display:flex; gap:6px; padding:0 0 12px 0; overflow-x:auto;
}
.gun-nokta{
  flex:1; min-width:6px; height:5px; border-radius:2px;
  background:var(--paper-dim); border:1px solid var(--line);
}
.gun-nokta.dolu{background:var(--gold); border-color:var(--gold);}

.sayfa{padding:18px 18px 0 18px;}

.ozet-kart{
  background:linear-gradient(135deg, var(--card), #1a2336); color:var(--ink); border:1px solid var(--line);
  border-radius:14px; padding:18px 18px;
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:18px;
}
.ozet-sayi{font-size:30px; font-weight:700; font-family:'Times New Roman',serif; line-height:1;}
.ozet-etiket{font-family:-apple-system,sans-serif; font-size:10.5px; text-transform:uppercase; letter-spacing:0.8px; color:#c9c3b3; margin-top:4px;}
.ozet-blok{text-align:center; flex:1;}
.ozet-ayrac{width:1px; background:rgba(255,255,255,0.15); align-self:stretch; margin:0 4px;}

.sinav-sekmeler{
  display:flex; gap:10px; margin-bottom:16px;
}
.sekme{
  flex:1; text-align:center; padding:11px 0;
  font-family:-apple-system, sans-serif; font-weight:600; font-size:14px;
  border:2px solid var(--line); border-radius:10px;
  background:transparent; color:var(--ink);
  letter-spacing:0.5px;
}
.sekme.aktif{background:var(--gold); color:var(--paper); border-color:var(--gold);}

.arama-kutu{
  width:100%; padding:11px 14px; margin-bottom:16px;
  border:1.5px solid var(--line); border-radius:10px;
  background:var(--card); font-family:-apple-system,sans-serif; font-size:14px;
  color:var(--ink);
}
.arama-kutu::placeholder{color:var(--gray);}

.ders-blok{margin-bottom:14px; border-radius:14px; overflow:hidden; border:1px solid var(--line); background:var(--card);}

.ders-baslik{
  display:flex; align-items:center; gap:10px;
  padding:14px 14px;
  cursor:pointer;
}
.renk-cubuk{width:5px; height:18px; border-radius:2px; display:inline-block; flex-shrink:0;}
.ders-baslik h2{
  font-size:16px; margin:0; font-weight:700;
  font-family:'Times New Roman', serif;
  flex-shrink:0;
}
.ders-baslik .kaynak{
  font-family:-apple-system,sans-serif; font-size:10.5px; color:var(--gray);
  margin-left:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.ders-baslik .konu-sayisi{
  margin-left:auto; flex-shrink:0;
  font-family:-apple-system,sans-serif; font-size:11px; color:var(--gray);
}
.ok-ikon{width:14px; height:14px; flex-shrink:0; transition:transform .2s; color:var(--gray);}
.ders-blok.acik .ok-ikon{transform:rotate(180deg);}

.ders-ilerleme-cubuk{
  height:4px; background:var(--paper-dim); margin:0 14px 14px 14px; border-radius:3px; overflow:hidden;
}
.ders-ilerleme-ic{height:100%; border-radius:3px; transition:width .3s;}

.konu-liste{
  border-top:1px solid var(--line);
  max-height:0; overflow:hidden;
  transition:max-height .25s ease;
}
.ders-blok.acik .konu-liste{max-height:none;}

.konu{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
}
.konu:last-child{border-bottom:none;}
.konu.tamam{background:rgba(79,174,122,0.10);}
.konu.gizli-arama{display:none;}

.kutucuk{
  width:21px; height:21px; border-radius:6px;
  border:2px solid var(--line);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--card);
}
.kutucuk svg{width:12px; height:12px; display:none;}
.konu.tamam .kutucuk{background:var(--ok); border-color:var(--ok);}
.konu.tamam .kutucuk svg{display:block;}

.konu-ad{
  flex:1; font-size:14.5px; line-height:1.3;
}
.konu.tamam .konu-ad{color:var(--gray); text-decoration:line-through; text-decoration-color:var(--gray); text-decoration-thickness:1px;}

.soru-girisi{
  display:flex; align-items:center; gap:4px;
  font-family:-apple-system, sans-serif;
}
.soru-girisi input{
  width:36px; text-align:center;
  border:1px solid var(--line); border-radius:6px;
  padding:5px 2px; font-size:12.5px;
  font-family:-apple-system, sans-serif;
  background:var(--paper-dim);
}
.soru-girisi span{font-size:10.5px; color:var(--gray);}

.alt-nav{
  position:fixed; bottom:0; left:0; right:0;
  background:var(--card);
  display:flex;
  padding:8px 6px env(safe-area-inset-bottom) 6px;
  z-index:30;
  border-top:1px solid #000;
}
.nav-btn{
  flex:1; text-align:center; padding:8px 0 4px;
  background:none; border:none; color:#9a948a;
  font-family:-apple-system, sans-serif; font-size:10.5px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  letter-spacing:0.3px;
}
.nav-btn.aktif{color:var(--gold);}
.nav-btn svg{width:21px; height:21px;}

.gizli{display:none !important;}

.istatistik-kart{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:16px; margin-bottom:14px;
}
.istatistik-kart h3{
  margin:0 0 10px 0; font-size:13px; font-family:-apple-system,sans-serif;
  font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:0.5px;
}
.cubuk-satir{display:flex; align-items:center; gap:10px; margin-bottom:9px; font-family:-apple-system,sans-serif;}
.cubuk-etiket{width:96px; font-size:11.5px; flex-shrink:0;}
.cubuk-arka{flex:1; height:9px; background:var(--paper-dim); border-radius:5px; overflow:hidden;}
.cubuk-ic{height:100%; border-radius:5px;}
.cubuk-yuzde{width:36px; text-align:right; font-size:11px; color:var(--gray); flex-shrink:0;}

.reset-btn{
  width:100%; padding:13px; margin-top:6px;
  background:none; border:1.5px solid var(--c-matematik); color:var(--c-matematik);
  border-radius:10px; font-family:-apple-system,sans-serif; font-weight:600; font-size:13px;
}

.tumunu-btn{
  display:flex; gap:8px; margin-bottom:14px;
}
.tumunu-btn button{
  flex:1; padding:9px 0; font-family:-apple-system,sans-serif; font-size:12px; font-weight:600;
  border:1.3px solid var(--line); border-radius:8px; background:var(--card); color:var(--ink);
}

.plan-kart{
  background:linear-gradient(135deg, var(--card), #1a2336);
  border:1px solid var(--line); border-radius:14px;
  padding:18px; margin-bottom:16px;
}
.plan-kart-ust{
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;
}
.plan-gun-no{
  font-family:'Times New Roman',serif; font-weight:700; font-size:20px; color:var(--gold);
}
.plan-durum{
  font-family:-apple-system,sans-serif; font-size:11px; text-transform:uppercase;
  letter-spacing:0.8px; color:var(--gray);
}
.plan-aciklama{
  font-family:-apple-system,sans-serif; font-size:13px; color:var(--ink); line-height:1.5; opacity:0.85;
}

.bugun-ders-grup{margin-bottom:12px;}
.bugun-ders-baslik{
  display:flex; align-items:center; gap:8px; margin-bottom:6px; padding-left:2px;
}
.bugun-ders-baslik .renk-cubuk{width:4px; height:14px;}
.bugun-ders-baslik span{
  font-family:-apple-system,sans-serif; font-weight:700; font-size:13px; letter-spacing:0.3px;
}

.bugun-konu{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; margin-bottom:6px;
  background:var(--card); border:1px solid var(--line); border-radius:10px;
}
.bugun-konu.tamam{background:rgba(79,174,122,0.10); border-color:rgba(79,174,122,0.3);}
.bugun-konu .konu-ad{flex:1; font-size:14px; line-height:1.3;}
.bugun-konu.tamam .konu-ad{color:var(--gray); text-decoration:line-through;}

.tamamlandi-kart{
  text-align:center; padding:36px 18px;
  font-family:-apple-system,sans-serif; color:var(--gray); font-size:13px; line-height:1.6;
}
.tamamlandi-kart .buyuk-emoji{font-size:34px; margin-bottom:10px; display:block;}

.plan-not-kart{
  margin-top:18px; padding:14px 16px;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  font-family:-apple-system,sans-serif; font-size:12px; color:var(--gray); line-height:1.6;
}

.tam-ekran-btn {
  position:fixed; bottom:90px; right:16px; z-index:100;
  width:44px; height:44px; border-radius:50%;
  background:var(--gold); border:none;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
.tam-ekran-btn svg { width:20px; height:20px; color:var(--paper); }
</style>
</head>
<body>

<div class="head">
  <div class="head-inner">
    <div class="brand">Burak<span>•</span>YKS DERS</div>
    <div class="tarih" id="bugunTarih"></div>
  </div>
  <div class="gunluksayac" id="gunSayac"></div>
</div>

<!-- BUGÜN SAYFASI -->
<div class="sayfa" id="sayfa-bugun">

  <div class="plan-kart">
    <div class="plan-kart-ust">
      <div class="plan-gun-no" id="planGunNo">Gün 1</div>
      <div class="plan-durum" id="planDurum">TYT dönemi</div>
    </div>
    <div class="plan-aciklama" id="planAciklama"></div>
  </div>

  <div id="bugunListesi"></div>

  <div class="plan-not-kart" id="planNotKart"></div>

</div>

<!-- ANA SAYFA -->
<div class="sayfa gizli" id="sayfa-ana">

  <div class="ozet-kart">
    <div class="ozet-blok">
      <div class="ozet-sayi" id="ozetTamam">0</div>
      <div class="ozet-etiket">Tamam</div>
    </div>
    <div class="ozet-ayrac"></div>
    <div class="ozet-blok">
      <div class="ozet-sayi" id="ozetToplam">0</div>
      <div class="ozet-etiket">Konu</div>
    </div>
    <div class="ozet-ayrac"></div>
    <div class="ozet-blok">
      <div class="ozet-sayi" id="ozetSoru">0</div>
      <div class="ozet-etiket">Soru</div>
    </div>
    <div class="ozet-ayrac"></div>
    <div class="ozet-blok">
      <div class="ozet-sayi" id="ozetYuzde">%0</div>
      <div class="ozet-etiket">İlerleme</div>
    </div>
  </div>

  <div class="sinav-sekmeler">
    <button class="sekme aktif" data-sinav="TYT" onclick="sinavSec('TYT')">TYT</button>
    <button class="sekme" data-sinav="AYT" onclick="sinavSec('AYT')">AYT</button>
  </div>

  <input class="arama-kutu" id="aramaKutu" type="text" placeholder="Konu ara…" oninput="aramaUygula()">

  <div class="tumunu-btn">
    <button onclick="hepsiniAc()">Hepsini Aç</button>
    <button onclick="hepsiniKapat()">Hepsini Kapat</button>
  </div>

  <div id="dersAlani"></div>

</div>

<!-- İSTATİSTİK SAYFASI -->
<div class="sayfa gizli" id="sayfa-istatistik">
  <div class="istatistik-kart">
    <h3>Ders Bazlı İlerleme</h3>
    <div id="istatistikIcerik"></div>
  </div>
  <div class="istatistik-kart">
    <h3>Veri</h3>
    <button class="reset-btn" onclick="sifirla()">Tüm İlerlemeyi Sıfırla</button>
  </div>
</div>

<div class="alt-nav">
  <button class="nav-btn aktif" data-sayfa="bugun" onclick="sayfaGec('bugun')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
    Bugün
  </button>
  <button class="nav-btn" data-sayfa="ana" onclick="sayfaGec('ana')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12l8-8 8 8M6 10v10h12V10"/></svg>
    Konular
  </button>
  <button class="nav-btn" data-sayfa="istatistik" onclick="sayfaGec('istatistik')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    İstatistik
  </button>
</div>

/* ---------- DURUM ---------- */
const DEPO_ANAHTAR = "yksTakipDurumu_v2";
let durum = {};

function depodanYukle(){
  try{
    const ham = localStorage.getItem(DEPO_ANAHTAR);
    durum = ham ? JSON.parse(ham) : {};
  }catch(e){ durum = {}; }
}
function depoyaKaydet(){
  try{ localStorage.setItem(DEPO_ANAHTAR, JSON.stringify(durum)); }catch(e){}
}
function konuAnahtari(sinavTuru, dersAd, konuIndex){
  return sinavTuru+"|"+dersAd+"|"+konuIndex;
}
function konuDurum(anahtar){
  return durum[anahtar] || {tamam:false, soru:0};
}

let aktifSinav = "TYT";
let acikDersler = {};

/* ---------- BUGÜN PLANI ---------- */
const PLAN_BASLANGIC = new Date(2026,6,20); // 20 Temmuz 2026, Pazartesi (ay 0-index)
const GUNLUK_VIDEO_HEDEFI = 2;

function gunIndeksiHesapla(){
  const su = new Date();
  const suGun = new Date(su.getFullYear(), su.getMonth(), su.getDate());
  const fark = Math.round((suGun - PLAN_BASLANGIC) / 86400000);
  return fark; // 0 = başlangıç günü
}

function dersTamamMi(sinav, ders){
  return ders.konular.every((k,i)=> konuDurum(konuAnahtari(sinav, ders.ders, i)).tamam);
}

function tytTamamMi(){
  return MUFREDAT.TYT.every(ders=> dersTamamMi("TYT", ders));
}

function dersSiradakiKonular(sinav, ders, adet){
  const sonuc = [];
  for(let i=0;i<ders.konular.length;i++){
    const a = konuAnahtari(sinav, ders.ders, i);
    if(!konuDurum(a).tamam){
      sonuc.push({index:i, ad:ders.konular[i], anahtar:a});
      if(sonuc.length>=adet) break;
    }
  }
  return sonuc;
}

function bugunCiz(){
  const gunIndeksi = gunIndeksiHesapla();
  const gunNo = gunIndeksi + 1;
  const tytBitti = tytTamamMi();
  const planSinav = tytBitti ? "AYT" : "TYT";

  document.getElementById("planGunNo").textContent = gunIndeksi < 0 ? "Henüz başlamadı" : ("Gün " + Math.max(gunNo,1));
  document.getElementById("planDurum").textContent = tytBitti ? "AYT dönemi" : "TYT dönemi";

  const aciklamaEl = document.getElementById("planAciklama");
  if(gunIndeksi < 0){
    const gunler = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    const aylar = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
    aciklamaEl.textContent = "Çalışma planın "+PLAN_BASLANGIC.getDate()+" "+aylar[PLAN_BASLANGIC.getMonth()]+" "+gunler[PLAN_BASLANGIC.getDay()]+" günü başlayacak. O güne kadar bu sayfa boş görünür, ama Konular sekmesinden istediğin zaman çalışabilirsin.";
  } else if(tytBitti){
    aciklamaEl.textContent = "TYT'yi bitirdin! Şimdi sıra AYT'de. Her dersten "+GUNLUK_VIDEO_HEDEFI+" video — alanına göre Matematik, Fizik, Kimya, Biyoloji'den ilerlediğin yere göre devam.";
  } else {
    aciklamaEl.textContent = "TYT'nin 10 dersinden günde "+GUNLUK_VIDEO_HEDEFI+"'şer video izle. Bitirdiğinde otomatik olarak AYT'ye geçeceksin.";
  }

  const listeKapsayici = document.getElementById("bugunListesi");
  listeKapsayici.innerHTML = "";

  if(gunIndeksi < 0){
    listeKapsayici.innerHTML = `<div class="tamamlandi-kart"><span class="buyuk-emoji">📅</span>Plan henüz başlamadı.<br>İstersen şimdiden Konular sekmesinden erken başlayabilirsin.</div>`;
    document.getElementById("planNotKart").textContent = "";
    return;
  }

  const dersListesi = MUFREDAT[planSinav];
  let hicKonuVarMi = false;

  dersListesi.forEach(ders=>{
    if(dersTamamMi(planSinav, ders)) return;
    const siradakiler = dersSiradakiKonular(planSinav, ders, GUNLUK_VIDEO_HEDEFI);
    if(siradakiler.length===0) return;
    hicKonuVarMi = true;

    const renk = DERS_RENK[ders.ders] || "var(--ink)";
    const grup = document.createElement("div");
    grup.className = "bugun-ders-grup";
    grup.innerHTML = `<div class="bugun-ders-baslik"><span class="renk-cubuk" style="background:${renk}"></span><span>${ders.ders}</span></div>`;

    siradakiler.forEach(s=>{
      const d = konuDurum(s.anahtar);
      const satir = document.createElement("div");
      satir.className = "bugun-konu" + (d.tamam ? " tamam" : "");
      satir.innerHTML = `
        <div class="kutucuk" data-anahtar="${s.anahtar}">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="konu-ad">${s.ad}</div>`;
      grup.appendChild(satir);
    });

    listeKapsayici.appendChild(grup);
  });

  if(!hicKonuVarMi){
    listeKapsayici.innerHTML = `<div class="tamamlandi-kart"><span class="buyuk-emoji">🎉</span>${planSinav} müfredatının tamamını bitirdin!</div>`;
  }

  listeKapsayici.querySelectorAll(".kutucuk").forEach(el=>{
    el.addEventListener("click", ()=>{
      const a = el.getAttribute("data-anahtar");
      const d = konuDurum(a);
      d.tamam = !d.tamam;
      durum[a] = d;
      depoyaKaydet();
      bugunCiz();
      ozetGuncelle();
    });
  });

  const notEl = document.getElementById("planNotKart");
  if(planSinav==="TYT"){
    notEl.textContent = "Not: 2027 YKS tarihi henüz ÖSYM tarafından resmi açıklanmadı; geçmiş yıllara göre 19-20 Haziran 2027 tahmin ediliyor. Bu tempoyla TYT'yi yaklaşık 34 günde, AYT'yi ise çok daha rahat bir hızla bitirirsin.";
  } else {
    notEl.textContent = "Not: 2027 YKS tarihi henüz ÖSYM tarafından resmi açıklanmadı; geçmiş yıllara göre 19-20 Haziran 2027 tahmin ediliyor.";
  }
}

/* ---------- ÇİZİM ---------- */
function dersAlaniCiz(){
  const kapsayici = document.getElementById("dersAlani");
  kapsayici.innerHTML = "";
  const liste = MUFREDAT[aktifSinav];
  const aramaMetni = (document.getElementById("aramaKutu").value || "").trim().toLocaleLowerCase('tr');

  liste.forEach((ders, dersIndex)=>{
    const renk = DERS_RENK[ders.ders] || "var(--ink)";
    const dersAcikAnahtari = aktifSinav+"|"+ders.ders;
    const acik = !!acikDersler[dersAcikAnahtari] || aramaMetni.length>0;

    let tamamSayisi = 0;
    let gorunenVarMi = !aramaMetni;
    ders.konular.forEach((k, i)=>{
      const a = konuAnahtari(aktifSinav, ders.ders, i);
      if(konuDurum(a).tamam) tamamSayisi++;
      if(aramaMetni && k.toLocaleLowerCase('tr').includes(aramaMetni)) gorunenVarMi = true;
    });

    if(aramaMetni && !gorunenVarMi) return;

    const yuzde = Math.round((tamamSayisi/ders.konular.length)*100);

    const blok = document.createElement("div");
    blok.className = "ders-blok" + (acik ? " acik" : "");

    const baslik = document.createElement("div");
    baslik.className = "ders-baslik";
    baslik.innerHTML = `<span class="renk-cubuk" style="background:${renk}"></span>
      <h2>${ders.ders}</h2>
      <span class="kaynak">${ders.kaynak||""}</span>
      <span class="konu-sayisi">${tamamSayisi}/${ders.konular.length}</span>
      <svg class="ok-ikon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;
    baslik.addEventListener("click", ()=>{
      acikDersler[dersAcikAnahtari] = !acikDersler[dersAcikAnahtari];
      dersAlaniCiz();
    });
    blok.appendChild(baslik);

    const cubukDis = document.createElement("div");
    cubukDis.className = "ders-ilerleme-cubuk";
    cubukDis.innerHTML = `<div class="ders-ilerleme-ic" style="width:${yuzde}%; background:${renk}"></div>`;
    blok.appendChild(cubukDis);

    const liste_div = document.createElement("div");
    liste_div.className = "konu-liste";

    ders.konular.forEach((k, i)=>{
      const a = konuAnahtari(aktifSinav, ders.ders, i);
      const d = konuDurum(a);
      const eslesiyor = !aramaMetni || k.toLocaleLowerCase('tr').includes(aramaMetni);
      const satir = document.createElement("div");
      satir.className = "konu" + (d.tamam ? " tamam" : "") + (eslesiyor ? "" : " gizli-arama");
      satir.innerHTML = `
        <div class="kutucuk" data-anahtar="${a}">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="konu-ad">${k}</div>
        <div class="soru-girisi">
          <input type="number" min="0" inputmode="numeric" value="${d.soru||""}" placeholder="0" data-soru-anahtar="${a}">
          <span>soru</span>
        </div>`;
      liste_div.appendChild(satir);
    });

    blok.appendChild(liste_div);
    kapsayici.appendChild(blok);
  });

  kapsayici.querySelectorAll(".kutucuk").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const a = el.getAttribute("data-anahtar");
      const d = konuDurum(a);
      d.tamam = !d.tamam;
      durum[a] = d;
      depoyaKaydet();
      dersAlaniCiz();
      ozetGuncelle();
    });
  });

  kapsayici.querySelectorAll("[data-soru-anahtar]").forEach(el=>{
    el.addEventListener("click", (e)=> e.stopPropagation());
    el.addEventListener("input", ()=>{
      const a = el.getAttribute("data-soru-anahtar");
      const d = konuDurum(a);
      d.soru = parseInt(el.value)||0;
      durum[a] = d;
      depoyaKaydet();
      ozetGuncelle();
    });
  });
}

function aramaUygula(){ dersAlaniCiz(); }

function hepsiniAc(){
  MUFREDAT[aktifSinav].forEach(ders=>{
    acikDersler[aktifSinav+"|"+ders.ders] = true;
  });
  dersAlaniCiz();
}
function hepsiniKapat(){
  MUFREDAT[aktifSinav].forEach(ders=>{
    acikDersler[aktifSinav+"|"+ders.ders] = false;
  });
  dersAlaniCiz();
}

function ozetGuncelle(){
  let toplamKonu=0, tamamKonu=0, toplamSoru=0;
  ["TYT","AYT"].forEach(sinav=>{
    MUFREDAT[sinav].forEach(ders=>{
      ders.konular.forEach((k,i)=>{
        const a = konuAnahtari(sinav, ders.ders, i);
        const d = konuDurum(a);
        toplamKonu++;
        if(d.tamam) tamamKonu++;
        toplamSoru += (d.soru||0);
      });
    });
  });
  document.getElementById("ozetTamam").textContent = tamamKonu;
  document.getElementById("ozetToplam").textContent = toplamKonu;
  document.getElementById("ozetSoru").textContent = toplamSoru;
  document.getElementById("ozetYuzde").textContent = "%"+(toplamKonu? Math.round((tamamKonu/toplamKonu)*100):0);

  istatistikCiz();
}

function istatistikCiz(){
  const kapsayici = document.getElementById("istatistikIcerik");
  kapsayici.innerHTML = "";
  ["TYT","AYT"].forEach(sinav=>{
    MUFREDAT[sinav].forEach(ders=>{
      let tamam=0;
      ders.konular.forEach((k,i)=>{
        const a = konuAnahtari(sinav, ders.ders, i);
        if(konuDurum(a).tamam) tamam++;
      });
      const yuzde = Math.round((tamam/ders.konular.length)*100);
      const renk = DERS_RENK[ders.ders] || "var(--ink)";
      const etiket = sinav + " " + ders.ders;
      const satir = document.createElement("div");
      satir.className = "cubuk-satir";
      satir.innerHTML = `
        <div class="cubuk-etiket">${etiket}</div>
        <div class="cubuk-arka"><div class="cubuk-ic" style="width:${yuzde}%; background:${renk}"></div></div>
        <div class="cubuk-yuzde">%${yuzde}</div>`;
      kapsayici.appendChild(satir);
    });
  });
}

function sinavSec(sinav){
  aktifSinav = sinav;
  document.querySelectorAll(".sekme").forEach(b=>{
    b.classList.toggle("aktif", b.getAttribute("data-sinav")===sinav);
  });
  document.getElementById("aramaKutu").value = "";
  dersAlaniCiz();
}

function sayfaGec(ad){
  document.getElementById("sayfa-bugun").classList.toggle("gizli", ad!=="bugun");
  document.getElementById("sayfa-ana").classList.toggle("gizli", ad!=="ana");
  document.getElementById("sayfa-istatistik").classList.toggle("gizli", ad!=="istatistik");
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("aktif", b.getAttribute("data-sayfa")===ad);
  });
  if(ad==="istatistik") istatistikCiz();
  if(ad==="bugun") bugunCiz();
}

function sifirla(){
  if(confirm("Tüm ilerleme silinecek. Onaylıyor musun?")){
    durum = {};
    depoyaKaydet();
    dersAlaniCiz();
    ozetGuncelle();
    bugunCiz();
  }
}

/* ---------- TARİH & GÜN SAYACI ---------- */
function tarihYaz(){
  const gunler = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const aylar = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const su = new Date();
  document.getElementById("bugunTarih").textContent = su.getDate()+" "+aylar[su.getMonth()]+" • "+gunler[su.getDay()];
}

function gunSayaciCiz(){
  const kapsayici = document.getElementById("gunSayac");
  kapsayici.innerHTML = "";
  const su = new Date();
  const gun = (su.getDay()+6)%7; // Pazartesi=0
  for(let i=0;i<7;i++){
    const nokta = document.createElement("div");
    nokta.className = "gun-nokta" + (i<=gun ? " dolu" : "");
    kapsayici.appendChild(nokta);
  }
}


function tamEkranAc() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.querySelector('.tam-ekran-btn');
  if (document.fullscreenElement) {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>';
  } else {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>';
  }
});

/* ---------- BAŞLAT ---------- */
depodanYukle();
tarihYaz();
gunSayaciCiz();
dersAlaniCiz();
ozetGuncelle();
bugunCiz();
</script>


<button class="tam-ekran-btn" onclick="tamEkranAc()" title="Tam Ekran">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
  </svg>
</button>
